  <script>
    // 🛡️ NEURAL CONSOLE FILTER (Public Debut Optimized)
    const _originalError = console.error;
    console.error = function (...args) {
      if (!args[0]) return;
      const s = String(args[0]);
      if (s.includes('WebGL') || s.includes('bindTexture') || s.includes('favicon.ico')) return;
      _originalError.apply(console, args);
    };
    const _originalLog = console.log;
    console.log = function (...args) {
      if (!args[0]) return;
      const s = String(args[0]);
      if (s.includes('Loaded FBX') || s.includes('Retargeting') || s.includes('Matched bone') || s.includes('Animation retargeting')) return;
      _originalLog.apply(console, args);
    };
